name: Docker Publish

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY_HOST: ghcr.io
  DOKPLOY_WEBHOOK_URL: ${{ secrets.DOKPLOY_WEBHOOK }}

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare image name
        id: prep
        run: |
          IMAGE_NAME_LOWER="$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          echo "image_name=$IMAGE_NAME_LOWER" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_HOST }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.REGISTRY_HOST }}/${{ steps.prep.outputs.image_name }}:latest
            ${{ env.REGISTRY_HOST }}/${{ steps.prep.outputs.image_name }}:${{ github.sha }}

      - name: Trigger Dokploy deploy webhook
        if: ${{ success() && env.DOKPLOY_WEBHOOK_URL != '' }}
        env:
          WEBHOOK_URL: ${{ env.DOKPLOY_WEBHOOK_URL }}
        run: |
          curl -fsS -X POST "$WEBHOOK_URL" || curl -fsS "$WEBHOOK_URL"
