name: Docker Publish

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  REGISTRY_HOST: ${{ secrets.GITEA_REGISTRY }}
  IMAGE_NAME: ${{ github.repository }}
  DOKPLOY_WEBHOOK_URL: ${{ secrets.DOKPLOY_WEBHOOK }}

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Gitea registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_HOST }}
          username: ${{ secrets.GITEA_USERNAME }}
          password: ${{ secrets.GITEA_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY_HOST }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY_HOST }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Trigger Dokploy deploy webhook
        if: ${{ success() && env.DOKPLOY_WEBHOOK_URL != '' }}
        env:
          WEBHOOK_URL: ${{ env.DOKPLOY_WEBHOOK_URL }}
        run: |
          curl -fsS -X POST "$WEBHOOK_URL" || curl -fsS "$WEBHOOK_URL"
